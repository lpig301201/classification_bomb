<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>垃圾分類小英雄</title>
<style>
:root {
  --sky1:#dff5ff; --sky2:#f8fdff; --grass1:#8ad36d; --grass2:#63b84e;
  --card:#ffffffee; --text:#184057; --blue:#2d9cdb; --orange:#ff9f43; --green:#33b864; --gray:#8da4b3;
  --shadow:0 12px 30px rgba(24,64,87,.12); --radius:22px;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; color:var(--text);
  background:linear-gradient(180deg,var(--sky1),var(--sky2)); min-height:100vh; padding:12px;
}
.wrap { max-width:980px; margin:0 auto; }
.header {
  background:transparent; border-radius:28px;  padding:18px 20px; margin-bottom:12px;
  border:1px solid rgba(255,255,255,.8);
}
.header h1 { margin:0; font-size:32px; }
.header p { margin:6px 0 0; font-size:15px; opacity:.84; }
.stats {
  display:grid; grid-template-columns:1.4fr repeat(3,1fr); gap:10px; margin-bottom:12px;
}
.card {
  background:transparent; border-radius:22px;  padding:14px 16px;
  
}
.label { font-size:13px; opacity:.7; }
.value { font-size:30px; font-weight:400; margin-top:4px; }
.layout {
  display:grid; grid-template-columns:1.3fr .8fr; gap:12px;
}
.game-card {
  background:transparent; border-radius:28px;  overflow:hidden; 
}
.game-top {
  display:flex; justify-content:space-between; align-items:center; gap:10px; padding:14px 16px; flex-wrap:wrap;
}
.goal {
  display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; font-weight:400;
  background:#eef8ff; color:var(--blue);
}
.goal.normal { background:#f2f4f5; color:#61707d; }
.goal.recycle { background:#ecfff1; color:var(--green); }
.goal.food { background:#fff7eb; color:var(--orange); }

.game-area {
  position:relative; height:430px;
  background:
    radial-gradient(circle at 10% 14%, rgba(255,255,255,.75) 0 3%, transparent 3.2%),
    radial-gradient(circle at 22% 10%, rgba(255,255,255,.75) 0 4%, transparent 4.2%),
    linear-gradient(180deg,#8adfff 0%, #dff7ff 40%, #84d06e 40%, #6bc157 100%);
  overflow:hidden;
}
.road {
  position:absolute; left:0; right:0; bottom:0; height:150px;
  background:linear-gradient(180deg,#6d727a,#565b62);
}
.road:before {
  content:""; position:absolute; left:0; right:0; top:50%; height:6px; transform:translateY(-50%);
  background:repeating-linear-gradient(90deg,#fff7c2 0 42px, transparent 42px 66px);
}
.zone {
  position:absolute; left:160px; bottom:32px; width:120px; height:96px;
  border:3px dashed rgba(255,255,255,.88); border-radius:18px; background:rgba(255,255,255,.08);
}
.zone-tag {
  position:absolute; left:160px; bottom:134px; background:rgba(255,255,255,.92); border-radius:999px; padding:6px 10px; font-size:12px; font-weight:400;
}
.hero {
  position:absolute; left:56px; bottom:34px; width:82px; height:114px;
}
.hero .head {
  position:absolute; left:22px; top:0; width:38px; height:38px; background:#ffd7b0; border-radius:50%;
  border:3px solid rgba(0,0,0,.08);
}
.hero .body {
  position:absolute; left:16px; top:34px; width:50px; height:48px; background:linear-gradient(180deg,#33a1ff,#1f80d1); border-radius:18px 18px 12px 12px;
}
.hero .arm {
  position:absolute; width:14px; height:44px; background:#ffd7b0; border-radius:10px; top:40px; transform-origin:top center;
}
.hero .arm.left { left:5px; transform:rotate(18deg); }
.hero .arm.right { right:2px; transform:rotate(-20deg); }
.hero .leg {
  position:absolute; width:16px; height:34px; background:#1b4d7a; bottom:0; border-radius:12px;
}
.hero .leg.left { left:22px; }
.hero .leg.right { right:22px; }
.hero.hit .arm.right { animation:punch .18s ease 1; }
@keyframes punch {
  0% { transform:rotate(-20deg); }
  50% { transform:rotate(-75deg) translateY(-6px); }
  100% { transform:rotate(-20deg); }
}

.item {
  position:absolute; right:-130px; bottom:36px; min-width:92px; max-width:132px; min-height:78px;
  background:#fff; border:4px solid rgba(255,255,255,.9); border-radius:22px; box-shadow:0 14px 24px rgba(0,0,0,.14);
  display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:10px 12px;
}
.item-badge {
  display:inline-block; font-size:11px; font-weight:400; border-radius:999px; padding:4px 8px; margin-bottom:6px;
  background:#eef7ff; color:#4d7992;
}
.item-name { font-size:19px; font-weight:900; line-height:1.15; }
.feedback-pop {
  position:absolute; left:50%; top:34%; transform:translateX(-50%); font-size:34px; font-weight:900; opacity:0; pointer-events:none;
  text-shadow:0 6px 18px rgba(0,0,0,.18);
}
.feedback-pop.show { animation:pop .6s ease; }
@keyframes pop {
  0% { opacity:0; transform:translateX(-50%) translateY(18px) scale(.82); }
  20% { opacity:1; }
  100% { opacity:0; transform:translateX(-50%) translateY(-28px) scale(1.06); }
}
.controls {
  display:flex; gap:10px; padding:14px 16px 18px; flex-wrap:wrap;
}
button, a.action {
  border:none; border-radius:999px; padding:14px 20px; font-size:16px; font-weight:900; cursor:pointer; text-decoration:none;
  box-shadow:0 12px 22px rgba(45,156,219,.2);
}
.primary { background:linear-gradient(180deg,#33a1ff,#1f80d1); color:#fff; }
.hit-btn { background:linear-gradient(180deg,#ffb357,#ff8f1f); color:#fff; }
.ghost { background:#fff; color:var(--text); }

.side {
  display:flex; flex-direction:column; gap:12px;
}
.info h2, .guide h2 { margin:0 0 8px; font-size:22px; }
.info p, .guide p { margin:6px 0; line-height:1.5; font-size:14px; }
.result {
  position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(17,48,70,.4); padding:16px;
}
.result-card {
  width:min(92vw,420px); background:#fff; border-radius:28px; padding:24px; text-align:center; box-shadow:0 20px 36px rgba(0,0,0,.22);
}
.result-card h2 { margin:0 0 8px; font-size:30px; color:var(--text); }
.result-card p { color:var(--text); margin:8px 0 14px; }
.result-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

@media (max-width: 860px) {
  .stats { grid-template-columns:1fr 1fr; }
  .stats .header-mini { grid-column:1 / -1; }
  .layout { grid-template-columns:1fr; }
}
@media (max-width: 560px) {
  body { padding:8px; }
  .header { border-radius:22px; padding:16px; }
  .header h1 { font-size:28px; }
  .card { border-radius:18px; padding:12px; }
  .value { font-size:26px; }
  .game-card { border-radius:22px; }
  .game-area { height:340px; }
  .road { height:126px; }
  .hero { left:18px; width:74px; height:102px; bottom:28px; }
  .hero .head { left:18px; width:34px; height:34px; }
  .hero .body { left:14px; top:30px; width:44px; height:44px; }
  .zone, .zone-tag { left:98px; }
  .zone { width:96px; height:82px; bottom:28px; }
  .zone-tag { bottom:118px; font-size:11px; }
  .item { min-width:78px; max-width:108px; min-height:68px; bottom:30px; padding:8px 10px; }
  .item-name { font-size:16px; }
  .controls button, .controls a.action, .result-actions button, .result-actions a.action { width:100%; text-align:center; }
}

.cloud {
  position:absolute;
  width:80px;height:40px;
  background:white;
  border-radius:40px;
  opacity:.7;
}
.cloud:before,.cloud:after{
  content:"";position:absolute;background:white;border-radius:50%;
}
.cloud:before{width:40px;height:40px;left:-20px;top:0;}
.cloud:after{width:50px;height:50px;right:-20px;top:-10px;}

</style>
</head>
<body>
<div class="wrap">
  <section class="header">
    <h1>垃圾分類小英雄</h1>
    <p>40 秒挑戰｜看到符合目標的物品再出手，命中 10 次就能過關</p>
  </section>

  <section class="stats">
    <div class="card header-mini">
      <div class="label">本回合目標</div>
      <div id="goalText" class="value" style="font-size:26px;">資源回收</div>
    </div>
    <div class="card">
      <div class="label">分數</div>
      <div id="score" class="value">0</div>
    </div>
    <div class="card">
      <div class="label">剩餘時間</div>
      <div id="timer" class="value">40</div>
    </div>
    <div class="card">
      <div class="label">題庫筆數</div>
      <div id="bankCount" class="value" style="font-size:24px;">0</div>
    </div>
  </section>

  <section class="layout">
    <div class="game-card">
      <div class="game-top">
        <div id="goalBadge" class="goal recycle">♻️ 目標：資源回收</div>
        <div style="font-weight:400;">看準後再按 <span style="color:#ff8f1f;">💥 出手！</span></div>
      </div>

      <div class="game-area" id="gameArea"><div class="cloud" style="top:30px;left:40px;"></div><div class="cloud" style="top:60px;right:60px;"></div>
        <div class="zone"></div>
        <div class="zone-tag">出手區</div>

        <div class="hero" id="hero">
          <div class="head"></div>
          <div class="body"></div>
          <div class="arm left"></div>
          <div class="arm right"></div>
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>

        <div class="road"></div>
        <div class="feedback-pop" id="popText"></div>

        <div class="result" id="result">
          <div class="result-card">
            <h2 id="resultTitle">任務完成！</h2>
            <p id="resultDesc">你已達標，可以進入抽獎。</p>
            <div class="result-actions">
              <a id="lineBtn" class="action primary" href="https://line.me/R/ti/p/@YOUR_LINE_ID" target="_blank" rel="noopener">加入好友 / 抽獎</a>
              <button id="againBtn" class="ghost">再玩一次</button>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn" class="primary">開始挑戰</button>
        <button id="hitBtn" class="hit-btn">💥 出手！</button>
      </div>
    </div>

    <div class="side">
      <div class="card info">
        <h2>分類提示</h2>
        <p id="infoName"><strong>尚未命中任何物品</strong></p>
        <p id="infoDesc">開始後會顯示你剛剛擊中的物品與處理方式。</p>
        <p id="infoNote">只打符合本回合目標的物品，就能穩穩拿分。</p>
      </div>

      <div class="card guide">
        <h2>玩法說明</h2>
        <p>每回合會指定一個目標分類：一般垃圾、資源回收或廚餘。</p>
        <p>物品會從右邊往左前進，進到出手區時，若符合目標就按下「出手！」。</p>
        <p>答對 +10 分，40 秒內達到 100 分即可過關。</p>
      </div>
    </div>
  </section>
</div>

const goalTextEl = document.getElementById('goalText');
const goalBadgeEl = document.getElementById('goalBadge');
const gameArea = document.getElementById('gameArea');
const hero = document.getElementById('hero');
const popText = document.getElementById('popText');
const result = document.getElementById('result');
const resultTitle = document.getElementById('resultTitle');
const resultDesc = document.getElementById('resultDesc');
const startBtn = document.getElementById('startBtn');
const hitBtn = document.getElementById('hitBtn');
const againBtn = document.getElementById('againBtn');

const infoName = document.getElementById('infoName');
const infoDesc = document.getElementById('infoDesc');
const infoNote = document.getElementById('infoNote');

let score = 0;
let timeLeft = 40;
let running = false;
let goal = '資源回收';
let currentItem = null;
let currentNode = null;
let moveTimer = null;
let tickTimer = null;
let speed = 8.2; // slightly faster, still student-friendly

bankCountEl.textContent = QUESTION_BANK.length;

function pickGoal() {
  goal = GOALS[Math.floor(Math.random() * GOALS.length)];
  const meta = GOAL_META[goal];
  goalTextEl.textContent = goal;
  goalBadgeEl.textContent = `${meta.emoji} 目標：${goal}`;
  goalBadgeEl.className = `goal ${meta.cls}`;
}

function pickItem() {
  return QUESTION_BANK[Math.floor(Math.random() * QUESTION_BANK.length)];
}

function createItem() {
  removeItem();
  currentItem = pickItem();
  const node = document.createElement('div');
  node.className = 'item';
  node.innerHTML = `<span class="item-badge">分類挑戰</span><span class="item-name">${escapeHtml(currentItem.name)}</span>`;
  node.style.right = '-140px';
  gameArea.appendChild(node);
  currentNode = node;
}

function moveItem() {
  if (!running || !currentNode) return;
  let right = parseFloat(currentNode.style.right);
  right += speed;
  currentNode.style.right = right + 'px';
  const areaW = gameArea.clientWidth;
  const zoneLeft = window.innerWidth <= 560 ? 98 : 160;
  const zoneWidth = window.innerWidth <= 560 ? 96 : 120;
  const itemLeft = areaW - right - currentNode.offsetWidth;
  currentNode.dataset.inZone = (itemLeft + currentNode.offsetWidth > zoneLeft && itemLeft < zoneLeft + zoneWidth) ? '1' : '0';

  if (itemLeft < -currentNode.offsetWidth - 10) {
    removeItem();
    setTimeout(() => { if (running) createItem(); }, 220);
  }
}

function removeItem() {
  if (currentNode) currentNode.remove();
  currentNode = null;
  currentItem = null;
}

function updateInfo(item, correct=null) {
  if (!item) {
    infoName.innerHTML = '<strong>尚未命中任何物品</strong>';
    infoDesc.textContent = '開始後會顯示你剛剛擊中的物品與處理方式。';
    infoNote.textContent = '只打符合本回合目標的物品，就能穩穩拿分。';
    return;
  }
  infoName.innerHTML = `<strong>命中：${item.name}</strong>`;
  infoDesc.textContent = `分類：${item.type}｜${item.tip}`;
  if (correct === true) {
    infoNote.textContent = '答對了，繼續保持！';
  } else if (correct === false) {
    infoNote.textContent = `這題其實是「${item.type}」，下次看準再出手。`;
  }
}

function flash(text, ok=true) {
  popText.textContent = text;
  popText.style.color = ok ? '#1fa84a' : '#ff6f3c';
  popText.classList.remove('show');
  void popText.offsetWidth;
  popText.classList.add('show');
}

function hit() {
  if (!running || !currentItem || !currentNode) return;
  hero.classList.remove('hit');
  void hero.offsetWidth;
  hero.classList.add('hit');

  const inZone = currentNode.dataset.inZone === '1';
  if (!inZone) {
    flash('太早了', false);
    return;
  }

  const correct = currentItem.type === goal;
  updateInfo(currentItem, correct);
  if (correct) {
    score += 10;
    scoreEl.textContent = score;
    flash('+10', true);
  } else {
    flash('再看一下', false);
  }
  removeItem();
  setTimeout(() => { if (running) createItem(); }, 180);
}

function startGame() {
  score = 0;
  timeLeft = 40;
  running = true;
  speed = 8.2;
  scoreEl.textContent = score;
  timerEl.textContent = timeLeft;
  result.style.display = 'none';
  updateInfo(null);
  pickGoal();
  createItem();

  clearInterval(moveTimer);
  clearInterval(tickTimer);

  moveTimer = setInterval(() => {
    moveItem();
  }, 16);

  tickTimer = setInterval(() => {
    timeLeft -= 1;
    timerEl.textContent = timeLeft;

    if (timeLeft > 0 && timeLeft % 10 === 0) {
      pickGoal();
    }
    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  running = false;
  clearInterval(moveTimer);
  clearInterval(tickTimer);
  removeItem();
  const passed = score >= 100;
  resultTitle.textContent = passed ? '任務完成！' : '再挑戰一次！';
  resultDesc.textContent = passed
    ? `你得到 ${score} 分，已經達標。`
    : `你得到 ${score} 分，再拿一點分數就能過關。`;
  result.style.display = 'flex';
}

function escapeHtml(str) {
  return str.replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
}

startBtn.addEventListener('click', startGame);
hitBtn.addEventListener('click', hit);
againBtn.addEventListener('click', startGame);
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === 'Enter') hit();
});
gameArea.addEventListener('click', () => hit());
</script>
</body>
</html>
