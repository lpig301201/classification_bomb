<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>分類炸彈大挑戰｜活動版</title>
  <style>
    :root {
      --bg1:#0b5d46; --bg2:#083527; --bg3:#071620;
      --panel:rgba(255,255,255,.12); --line:rgba(255,255,255,.14);
      --text:#f8fafc; --muted:#d8ebe5; --good:#22c55e; --bad:#ef4444; --goal:#fbbf24;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    html,body { margin:0; min-height:100%; overflow:hidden; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; color:var(--text); }
    body {
      display:flex; justify-content:center;
      background:
        radial-gradient(circle at 18% 15%, rgba(45,212,191,.20), transparent 18%),
        radial-gradient(circle at 85% 10%, rgba(34,197,94,.16), transparent 18%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 36%, var(--bg3) 100%);
    }
    .app { width:min(100vw,900px); min-height:100vh; position:relative; overflow:hidden; }
    #arena { position:absolute; inset:0; overflow:hidden; touch-action:none; }
    #arena::before, #arena::after {
      content:""; position:absolute; border-radius:50%; filter:blur(38px); opacity:.28; pointer-events:none;
    }
    #arena::before { width:320px; height:320px; background:#34d399; left:-90px; top:16%; }
    #arena::after { width:280px; height:280px; background:#2dd4bf; right:-80px; bottom:8%; }
    .bubble {
      position:absolute; opacity:.12; pointer-events:none; animation:floatBubble linear infinite; font-size:clamp(18px,2vw,26px);
    }
    @keyframes floatBubble { from { transform:translateY(108vh) rotate(0); } to { transform:translateY(-14vh) rotate(360deg); } }

    .glass {
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08));
      border:1px solid var(--line); border-radius:24px;
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:var(--shadow);
    }

    .topbar { position:absolute; inset:0 0 auto 0; z-index:30; padding:calc(12px + var(--safe-top)) 14px 8px; }
    .hero { padding:14px; display:grid; grid-template-columns:1.15fr .85fr; gap:10px; align-items:stretch; }
    .title { font-size:clamp(24px,5vw,36px); font-weight:950; line-height:1.05; letter-spacing:.5px; }
    .subtitle { margin-top:6px; color:var(--muted); font-size:13px; line-height:1.45; }
    .scoreboard { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .metric { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:10px 8px; text-align:center; }
    .metric .k { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .metric .v { font-size:clamp(22px,4vw,28px); font-weight:900; }
    .goal { color:#fde68a; }

    .missionline {
      margin-top:10px; padding:12px 14px; display:grid; grid-template-columns:auto auto 1fr; gap:12px; align-items:center;
    }
    .labelmini { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .targetbox {
      padding:10px 14px; min-width:132px; border-radius:18px;
      background:linear-gradient(180deg, rgba(34,197,94,.20), rgba(16,185,129,.08));
      border:1px solid rgba(110,231,183,.26);
    }
    .targetvalue { font-size:clamp(18px,3.5vw,24px); font-weight:900; letter-spacing:.5px; }
    .descbox {
      min-height:72px; padding:10px 12px; border-radius:18px;
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
      display:grid; grid-template-columns:44px 1fr; gap:10px; align-items:center;
    }
    .descicon {
      width:44px; height:44px; border-radius:14px; display:grid; place-items:center; font-size:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.14);
    }
    .descitem { font-size:16px; font-weight:900; margin-bottom:2px; }
    .desctext { font-size:12px; line-height:1.45; color:#effaf6; }
    .placeholder { color:var(--muted); }

    .controls {
      position:absolute; left:0; right:0; bottom:calc(14px + var(--safe-bottom)); z-index:30; padding:0 14px;
    }
    .foot { padding:10px 12px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .hint { color:var(--muted); font-size:12px; line-height:1.35; }
    .btns { display:flex; gap:8px; flex-wrap:wrap; }
    button, .fakebtn {
      border:0; border-radius:16px; padding:12px 18px; font-size:15px; font-weight:900; color:white; cursor:pointer;
      box-shadow:var(--shadow); text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
    }
    .primary { background:linear-gradient(180deg,#22c55e,#16a34a); }
    .secondary { background:linear-gradient(180deg,#0ea5e9,#0284c7); }
    .darkbtn { background:linear-gradient(180deg,#334155,#1e293b); }
.hidden { display:none !important; }

    .item {
      position:absolute; width:96px; min-height:102px; padding:10px 8px 12px; border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.16); box-shadow:var(--shadow);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
      transform:translate(-50%, -50%) scale(.92); animation:itemPop .18s ease-out forwards, drift var(--driftDur) ease-in-out infinite alternate;
    }
    @keyframes itemPop { to { transform:translate(-50%, -50%) scale(1); } }
    @keyframes drift {
      from { margin-top:-5px; margin-left:-4px; }
      to { margin-top:5px; margin-left:4px; }
    }
    .item.hit { animation:boom .28s ease-out forwards; }
    @keyframes boom {
      0% { transform:translate(-50%,-50%) scale(1); opacity:1; }
      60% { transform:translate(-50%,-50%) scale(1.18); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(.2); opacity:0; }
    }
    .emoji { font-size:34px; line-height:1; filter:drop-shadow(0 2px 8px rgba(255,255,255,.18)); }
    .name { font-size:13px; font-weight:900; line-height:1.2; text-align:center; word-break:break-word; }
    .sub { font-size:11px; color:#dcedea; opacity:.92; }

    .crosshair {
      position:absolute; left:50%; top:68%; width:74px; height:74px; transform:translate(-50%,-50%);
      border:3px solid rgba(255,255,255,.94); border-radius:50%; z-index:24; pointer-events:none;
      box-shadow:0 0 0 4px rgba(16,185,129,.20), 0 0 20px rgba(255,255,255,.16);
    }
    .crosshair::before,.crosshair::after {
      content:""; position:absolute; left:50%; top:50%; background:white; transform:translate(-50%,-50%);
    }
    .crosshair::before { width:2px; height:86px; }
    .crosshair::after { width:86px; height:2px; }
    .dot { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:10px; height:10px; background:#fff; border-radius:50%; box-shadow:0 0 10px rgba(255,255,255,.55); }

    .blast {
      position:absolute; width:22px; height:22px; border-radius:50%; pointer-events:none; z-index:25; transform:translate(-50%, -50%);
      background:radial-gradient(circle, rgba(255,255,255,.96) 0%, rgba(255,255,255,.6) 20%, rgba(250,204,21,.55) 42%, rgba(250,204,21,0) 72%);
      animation:blast .30s ease-out forwards;
    }
    @keyframes blast { 0% { width:16px; height:16px; opacity:1; } 100% { width:150px; height:150px; opacity:0; } }

    .toast {
      position:absolute; left:50%; bottom:138px; transform:translateX(-50%); z-index:40;
      min-width:190px; max-width:88vw; padding:12px 16px; border-radius:16px;
      background:rgba(15,23,42,.88); border:1px solid rgba(255,255,255,.12); text-align:center; box-shadow:var(--shadow);
      opacity:0; pointer-events:none;
    }
    .toast.show { animation:toastIn 1.15s ease both; }
    @keyframes toastIn {
      0% { opacity:0; transform:translateX(-50%) translateY(10px); }
      12%,78% { opacity:1; transform:translateX(-50%) translateY(0); }
      100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
    }

    .overlay {
      position:absolute; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; padding:20px;
      background:rgba(2,6,23,.56); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    }
    .panel {
      width:min(92vw,560px); padding:22px; text-align:center; border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.14); box-shadow:var(--shadow);
    }
    .panel h2 { margin:0; font-size:clamp(28px,6vw,40px); line-height:1.05; }
    .panel p { margin:10px 0 0; color:var(--muted); line-height:1.55; }
    .heroicon { font-size:58px; margin-bottom:10px; }
    .buttons { margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

    .achievement {
      margin-top:14px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    }
    .achievement .mini {
      border-radius:18px; padding:10px 8px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
    }
    .achievement .mini .n { font-size:22px; font-weight:900; }
    .achievement .mini .t { font-size:12px; color:var(--muted); }

    .qrWrap {
      margin:16px auto 0; display:flex; justify-content:center;
    }
    .qrCard {
      width:min(290px,72vw); padding:14px; border-radius:24px; background:white; color:#0f172a;
      box-shadow:0 12px 32px rgba(0,0,0,.18);
    }
    .qrCard img { width:100%; border-radius:16px; display:block; }
    .qrCaption { margin-top:8px; font-size:13px; color:#334155; }
.rankrow:nth-child(odd) { background:rgba(255,255,255,.04); }
@media (max-width:760px) {
      .hero { grid-template-columns:1fr; }
      .missionline { grid-template-columns:1fr; }
      .descbox { min-height:unset; }
      .item { width:84px; min-height:90px; border-radius:22px; }
      .emoji { font-size:30px; }
      .name { font-size:12px; }
      .crosshair { width:66px; height:66px; }
      .crosshair::before { height:78px; }
      .crosshair::after { width:78px; }
      .achievement,
.foot { justify-content:center; }
      .hint { text-align:center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="arena">
      <div class="crosshair" id="crosshair"><div class="dot"></div></div>
      <div class="toast" id="toast"></div>
    </div>

    <div class="topbar">
      <div class="glass hero">
        <div>
          <div class="title">♻️ 分類炸彈大挑戰</div>
          <div class="subtitle">瞄準、引爆、正確分類。40 秒內累積 100 分即可參加活動抽獎。</div>
        </div>
        <div class="scoreboard">
          <div class="metric"><div class="k">剩餘時間</div><div class="v" id="time">40</div></div>
          <div class="metric"><div class="k">目前分數</div><div class="v" id="score">0</div></div>
          <div class="metric"><div class="k">達標門檻</div><div class="v goal">100</div></div>
        </div>
      </div>

      <div class="glass missionline">
        <div class="targetbox">
          <div class="labelmini">本回合目標</div>
          <div class="targetvalue" id="targetLabel">資源回收</div>
        </div>
        <div class="labelmini" style="align-self:start; margin-top:4px;">命中物件說明</div>
        <div class="descbox">
          <div class="descicon" id="descIcon">💡</div>
          <div>
            <div class="descitem" id="descItem">等待命中物件</div>
            <div class="desctext placeholder" id="descText">瞄準畫面圖卡並引爆，這裡會顯示正確分類與處理提醒。</div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="glass foot">
        <div class="hint">拖曳準星後點擊物件即可引爆。答對 +10 分，答錯不加分。</div>
        <div class="btns">
          <button class="secondary" id="restartBtn">重新開始</button>
          <button class="primary" id="startBtn">開始遊戲</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="startOverlay">
      <div class="panel">
        <div class="heroicon">🌿</div>
        <h2>準備開始</h2>
        <p>依照畫面指定的分類目標，瞄準對應物品並引爆。<br>40 秒內達到 100 分，即可參加活動抽獎。</p>
        <div class="buttons">
          <button class="primary" id="overlayStart">開始挑戰</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="endOverlay">
      <div class="panel">
        <div class="heroicon" id="endHero">🎉</div>
        <h2 id="endTitle">挑戰完成</h2>
        <p id="endText"></p>

        <div class="achievement">
          <div class="mini"><div class="n" id="endScore">0</div><div class="t">本次得分</div></div>
          <div class="mini"><div class="n">100</div><div class="t">達標門檻</div></div>
        </div>

        <div class="qrWrap hidden" id="qrWrap">
          <div class="qrCard">
            <img id="qrImage" alt="LINE QR Code" />
            <div class="qrCaption">掃描 QR Code 或點擊下方按鈕前往 LINE 完成活動參加。</div>
          </div>
        </div>

        <div class="buttons">
          <button class="secondary" id="playAgain">再玩一次</button>
          <button class="primary hidden" id="lineBtn">前往 LINE 參加抽獎</button>
        </div>
      </div>
    </div>

  </div>

}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function nextTarget() {
  targetType = pickRandom(TYPES);
  targetLabel.textContent = targetType;
}

function normalizeText(txt) {
  return (txt || "").replace(/\s+/g, " ").trim();
}

function createBubble() {
  const el = document.createElement("div");
  el.className = "bubble";
  el.textContent = pickRandom(["🍃","♻️","🌿","💧"]);
  el.style.left = Math.random()*100 + "%";
  el.style.animationDuration = (14 + Math.random()*12).toFixed(2) + "s";
  el.style.animationDelay = (-Math.random()*20).toFixed(2) + "s";
  arena.appendChild(el);
}
for (let i=0;i<12;i++) createBubble();

function resetDescription() {
  descIcon.textContent = "💡";
  descItem.textContent = "等待命中物件";
  descText.textContent = "瞄準畫面圖卡並引爆，這裡會顯示正確分類與處理提醒。";
  descText.classList.add("placeholder");
}

function updateDescription(item, correct) {
  descIcon.textContent = correct ? "✅" : "⚠️";
  descItem.textContent = item.emoji + " " + item.物品名稱 + "｜" + item.大類;
  descText.textContent = normalizeText(item.文字說明 || item["回收管道及處理方式"] || "請依照正確分類方式處理。");
  descText.classList.remove("placeholder");
}

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.remove("show");
  void toastEl.offsetWidth;
  toastEl.classList.add("show");
}

function makeBlast(x, y) {
  const b = document.createElement("div");
  b.className = "blast";
  b.style.left = x + "px";
  b.style.top = y + "px";
  arena.appendChild(b);
  setTimeout(()=> b.remove(), 340);
}

function clearItems() {
  activeItems.forEach(obj => obj.el.remove());
  activeItems = [];
}

function itemPositionValid(x, y) {
  return !activeItems.some(obj => {
    const dx = obj.x - x, dy = obj.y - y;
    return Math.hypot(dx, dy) < 98;
  });
}

function randomPosition() {
  const topPad = Math.min(window.innerHeight * 0.26, 210);
  const bottomPad = 170;
  const width = arena.clientWidth || window.innerWidth;
  const height = arena.clientHeight || window.innerHeight;
  for (let i=0;i<40;i++) {
    const x = 60 + Math.random() * (width - 120);
    const y = topPad + Math.random() * Math.max(100, height - topPad - bottomPad);
    if (itemPositionValid(x, y)) return {x,y};
  }
  return { x: 60 + Math.random()*(width-120), y: topPad + Math.random()*Math.max(100,height-topPad-bottomPad) };
}

function spawnOneItem() {
  const record = pickRandom(DATASET);
  const item = {
    ...record,
    emoji: iconFor(record.物品名稱, record.大類)
  };
  const pos = randomPosition();
  const el = document.createElement("div");
  el.className = "item";
  el.style.left = pos.x + "px";
  el.style.top = pos.y + "px";
  el.style.setProperty('--driftDur', (0.5 + Math.random()*0.6).toFixed(2) + 's');
  el.innerHTML = `<div class="emoji">${item.emoji}</div><div class="name">${item.物品名稱}</div><div class="sub">${item["廢棄物所屬分類"] || "分類挑戰"}</div>`;
  arena.appendChild(el);
  const obj = { ...item, el, x:pos.x, y:pos.y };
  activeItems.push(obj);

  const fire = () => {
    if (!gameActive) return;
    handleHit(obj);
  };
  el.addEventListener('click', fire);
  el.addEventListener('touchstart', (e) => { e.preventDefault(); fire(); }, {passive:false});
}

function refillItems() {
  while (activeItems.length < MAX_ITEMS) spawnOneItem();
}

function removeItem(obj) {
  activeItems = activeItems.filter(x => x !== obj);
  obj.el.remove();
}

function handleHit(obj) {
  if (!gameActive) return;
  makeBlast(obj.x, obj.y);
  const correct = obj.大類 === targetType;
  obj.el.classList.add('hit');
  updateDescription(obj, correct);
  if (correct) {
    score += POINTS_PER_HIT;
    toast(`✔ 命中成功！+${POINTS_PER_HIT} 分`);
    nextTarget();
  } else {
    toast(`✦ 這個是「${obj.大類}」`);
  }
  scoreEl.textContent = score;
  setTimeout(() => {
    removeItem(obj);
    if (gameActive) refillItems();
  }, 70);
}

function setCrosshair(clientX, clientY) {
  const rect = arena.getBoundingClientRect();
  let x = clientX - rect.left;
  let y = clientY - rect.top;
  x = Math.max(30, Math.min(rect.width - 30, x));
  y = Math.max(60, Math.min(rect.height - 90, y));
  crosshair.style.left = x + "px";
  crosshair.style.top = y + "px";
}

function startGame() {
  clearInterval(timer);
  clearItems();
  gameActive = true;
  score = 0;
  timeLeft = GAME_SECONDS;
  scoreEl.textContent = score;
  timeEl.textContent = timeLeft;
  resetDescription();
  qrWrap.classList.add('hidden');
  lineBtn.classList.add('hidden');
  nextTarget();
  refillItems();
  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');

  timer = setInterval(() => {
    timeLeft -= 1;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  if (!gameActive) return;
  gameActive = false;
  clearInterval(timer);
  clearItems();

  document.getElementById('endScore').textContent = score;

  const pass = score >= GOAL_SCORE;
  document.getElementById('endHero').textContent = pass ? "🎉" : "🌱";
  document.getElementById('endTitle').textContent = pass ? "恭喜達標" : "挑戰完成";
  document.getElementById('endText').innerHTML = pass
    ? `你已達到 <b>${score}</b> 分，取得抽獎資格。掃描 QR Code 或點擊按鈕即可前往 LINE。`
    : `本次得分 <b>${score}</b> 分，距離達標還差 <b>${Math.max(0, GOAL_SCORE-score)}</b> 分。再試一次吧！`;

  if (pass) {
    qrImage.src = QR_URL;
    qrWrap.classList.remove('hidden');
    lineBtn.classList.remove('hidden');
  } else {
    qrWrap.classList.add('hidden');
    lineBtn.classList.add('hidden');
  }

  endOverlay.classList.remove('hidden');
}

function openLine() {
  window.open(LINE_URL, "_blank");
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('overlayStart').onclick = startGame;
document.getElementById('restartBtn').onclick = startGame;
document.getElementById('playAgain').onclick = startGame;
document.getElementById('lineBtn').onclick = openLine;

window.addEventListener('mousemove', e => setCrosshair(e.clientX, e.clientY));
arena.addEventListener('touchmove', e => {
  if (e.touches && e.touches[0]) {
    setCrosshair(e.touches[0].clientX, e.touches[0].clientY);
  }
}, {passive:true});
window.addEventListener('resize', () => {
  if (!gameActive) return;
  clearItems();
  refillItems();
});

resetDescription();
qrImage.src = QR_URL;
</script>
</body>
</html>
