<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>分類炸彈大挑戰</title>
  <style>
    :root {
      --bg1:#062b22; --bg2:#0b3b2e; --bg3:#0f172a;
      --panel:rgba(255,255,255,.12); --line:rgba(255,255,255,.14);
      --text:#f8fafc; --muted:#d5e5df; --good:#22c55e; --bad:#ef4444; --goal:#f59e0b; --mint:#5eead4;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    html,body { margin:0; min-height:100%; overflow:hidden; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; color:var(--text); }
    body {
      display:flex; justify-content:center;
      background:
        radial-gradient(circle at 15% 18%, rgba(52,211,153,.22), transparent 20%),
        radial-gradient(circle at 82% 15%, rgba(34,197,94,.18), transparent 18%),
        linear-gradient(180deg, #0b5d46 0%, #083527 28%, #06141f 100%);
    }
    .app { width:min(100vw,820px); min-height:100vh; position:relative; overflow:hidden; }
    #arena { position:absolute; inset:0; overflow:hidden; touch-action:none; }
    #arena::before, #arena::after {
      content:""; position:absolute; border-radius:50%; filter:blur(34px); opacity:.32; pointer-events:none;
    }
    #arena::before { width:300px; height:300px; background:#10b981; left:-70px; top:18%; }
    #arena::after { width:280px; height:280px; background:#14b8a6; right:-80px; bottom:12%; }
    .leaf {
      position:absolute; opacity:.16; pointer-events:none; font-size:22px; animation:floatLeaf linear infinite;
    }
    @keyframes floatLeaf {
      from { transform:translateY(105vh) rotate(0deg); }
      to { transform:translateY(-15vh) rotate(360deg); }
    }

    .topbar { position:absolute; inset:0 0 auto 0; z-index:30; padding:calc(12px + var(--safe-top)) 14px 10px; }
    .glass { background:var(--panel); border:1px solid var(--line); border-radius:24px; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:var(--shadow); }
    .headline {
      padding:14px; display:grid; grid-template-columns:1.1fr .9fr; gap:10px; align-items:stretch;
    }
    .title { font-size:clamp(24px,5vw,34px); font-weight:900; line-height:1.05; letter-spacing:.5px; }
    .subtitle { margin-top:6px; color:var(--muted); font-size:13px; line-height:1.45; }
    .scoreboard { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .metric { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:10px 8px; text-align:center; }
    .metric .k { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .metric .v { font-size:clamp(22px,4vw,28px); font-weight:900; }
    .goal { color:#fde68a; }
    .mission {
      margin-top:10px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .mission-label { font-size:13px; color:var(--muted); }
    .mission-value { font-size:clamp(19px,4vw,26px); font-weight:900; }
    .mission .tag { padding:8px 12px; border-radius:999px; background:rgba(16,185,129,.14); color:#ccfbf1; border:1px solid rgba(45,212,191,.28); font-size:13px; white-space:nowrap; }
    .descbox {
      margin-top:10px; padding:12px 14px; display:grid; grid-template-columns:auto 1fr; gap:10px; align-items:start;
    }
    .desc-icon {
      width:42px; height:42px; border-radius:14px; display:grid; place-items:center;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.16); font-size:22px;
    }
    .desc-title { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .desc-item { font-size:18px; font-weight:800; margin-bottom:4px; }
    .desc-text { font-size:13px; line-height:1.5; color:#effaf6; }
    .desc-placeholder { color:var(--muted); }

    .controls {
      position:absolute; left:0; right:0; bottom:calc(14px + var(--safe-bottom)); z-index:30; padding:0 14px;
    }
    .foot {
      padding:10px 12px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .hint { color:var(--muted); font-size:12px; line-height:1.4; }
    .btns { display:flex; gap:10px; }
    button {
      border:0; border-radius:16px; padding:12px 18px; font-size:16px; font-weight:800; color:white; cursor:pointer;
      box-shadow:var(--shadow);
    }
    .primary { background:linear-gradient(180deg,#22c55e,#16a34a); }
    .secondary { background:linear-gradient(180deg,#0ea5e9,#0284c7); }
    .hidden { display:none !important; }

    .item {
      position:absolute; width:96px; min-height:98px; padding:10px 8px 12px; border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.16); box-shadow:var(--shadow);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
      transform:translate(-50%, -50%) scale(0.94); animation:pop .18s ease-out forwards;
    }
    .item.hit { animation:boom .28s ease-out forwards; }
    @keyframes pop { to { transform:translate(-50%,-50%) scale(1); } }
    @keyframes boom {
      0% { transform:translate(-50%,-50%) scale(1); opacity:1; }
      60% { transform:translate(-50%,-50%) scale(1.18); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(.2); opacity:0; }
    }
    .item .emoji { font-size:34px; line-height:1; filter:drop-shadow(0 3px 8px rgba(255,255,255,.16)); }
    .item .name { font-size:13px; font-weight:800; line-height:1.25; text-align:center; word-break:break-word; }
    .item .mini { font-size:11px; color:#d7eee8; opacity:.9; }

    .crosshair {
      position:absolute; left:50%; top:68%; width:72px; height:72px; transform:translate(-50%,-50%);
      border:3px solid rgba(255,255,255,.95); border-radius:50%; z-index:24; pointer-events:none;
      box-shadow:0 0 0 4px rgba(16,185,129,.22), 0 0 24px rgba(255,255,255,.18);
    }
    .crosshair::before,.crosshair::after {
      content:""; position:absolute; left:50%; top:50%; background:white; transform:translate(-50%,-50%);
    }
    .crosshair::before { width:2px; height:86px; }
    .crosshair::after { width:86px; height:2px; }
    .crosshair .dot {
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:10px; height:10px;
      background:#f8fafc; border-radius:50%; box-shadow:0 0 10px rgba(255,255,255,.55);
    }
    .blast {
      position:absolute; width:22px; height:22px; border-radius:50%; pointer-events:none;
      background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,255,255,.6) 20%, rgba(250,204,21,.45) 40%, rgba(250,204,21,0) 72%);
      transform:translate(-50%, -50%); animation:blast .28s ease-out forwards; z-index:25;
    }
    @keyframes blast {
      0% { width:16px; height:16px; opacity:1; }
      100% { width:150px; height:150px; opacity:0; }
    }
    .toast {
      position:absolute; left:50%; bottom:140px; transform:translateX(-50%); z-index:40;
      min-width:180px; max-width:88vw; padding:12px 16px; border-radius:16px;
      background:rgba(15,23,42,.88); border:1px solid rgba(255,255,255,.12); text-align:center;
      box-shadow:var(--shadow); opacity:0; pointer-events:none;
    }
    .toast.show { animation:toastIn 1.15s ease both; }
    @keyframes toastIn {
      0% { opacity:0; transform:translateX(-50%) translateY(12px); }
      10%,75% { opacity:1; transform:translateX(-50%) translateY(0); }
      100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
    }

    .overlay {
      position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:24px;
      background:rgba(2,6,23,.54); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    }
    .panel {
      width:min(92vw,520px); padding:24px; text-align:center; border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.14); box-shadow:var(--shadow);
    }
    .panel h2 { margin:0; font-size:clamp(28px,6vw,40px); line-height:1.05; }
    .panel p { margin:10px 0 0; color:var(--muted); line-height:1.6; }
    .panel .hero { font-size:56px; margin-bottom:12px; }
    .panel .buttons { margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .qrbox {
      margin:16px auto 0; width:min(280px,70vw); aspect-ratio:1; border-radius:24px; padding:16px;
      background:white; color:#0f172a; display:grid; place-items:center;
    }
    .qr {
      width:100%; height:100%;
      background:
        linear-gradient(90deg,#000 10%,transparent 10%) 0 0/18px 18px,
        linear-gradient(#000 10%,transparent 10%) 0 0/18px 18px,
        radial-gradient(circle at 22% 22%, #000 16%, transparent 17%),
        radial-gradient(circle at 78% 22%, #000 16%, transparent 17%),
        radial-gradient(circle at 22% 78%, #000 16%, transparent 17%),
        linear-gradient(45deg,#000 12%,transparent 13%),
        linear-gradient(-45deg,#000 12%,transparent 13%);
      border-radius:18px;
      opacity:.85;
    }

    @media (max-width:700px) {
      .headline { grid-template-columns:1fr; }
      .item { width:82px; min-height:88px; border-radius:22px; }
      .item .emoji { font-size:30px; }
      .item .name { font-size:12px; }
      .crosshair { width:66px; height:66px; }
      .crosshair::before { height:78px; }
      .crosshair::after { width:78px; }
      .foot { justify-content:center; }
      .hint { text-align:center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="arena">
      <div class="crosshair" id="crosshair"><div class="dot"></div></div>
      <div class="toast" id="toast"></div>
    </div>

    <div class="topbar">
      <div class="glass headline">
        <div>
          <div class="title">♻️ 分類炸彈大挑戰</div>
          <div class="subtitle">瞄準、引爆、正確分類。40 秒內累積 100 分，即可前往 LINE 參加活動。</div>
        </div>
        <div class="scoreboard">
          <div class="metric"><div class="k">剩餘時間</div><div class="v" id="time">40</div></div>
          <div class="metric"><div class="k">目前分數</div><div class="v" id="score">0</div></div>
          <div class="metric"><div class="k">達標門檻</div><div class="v goal">100</div></div>
        </div>
      </div>

      <div class="glass mission">
        <div>
          <div class="mission-label">本回合目標</div>
          <div class="mission-value" id="targetLabel">資源回收</div>
        </div>
        <div class="tag" id="targetTag">請找出正確物品</div>
      </div>

      <div class="glass descbox">
        <div class="desc-icon" id="descIcon">💡</div>
        <div>
          <div class="desc-title">命中物件說明</div>
          <div class="desc-item" id="descItem">等待命中物件</div>
          <div class="desc-text desc-placeholder" id="descText">瞄準畫面上的圖卡並引爆，這裡會顯示該物品的正確處理方式與分類小提醒。</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="glass foot">
        <div class="hint">拖曳準星後點擊畫面即可引爆。答對 +10 分，答錯不加分。</div>
        <div class="btns">
          <button class="secondary" id="restartBtn">重新開始</button>
          <button class="primary" id="startBtn">開始遊戲</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="startOverlay">
      <div class="panel">
        <div class="hero">🌱</div>
        <h2>準備開始</h2>
        <p>請依照畫面指定的分類目標，瞄準對應物品並引爆。<br>40 秒內達到 100 分即可參加活動。</p>
        <div class="buttons">
          <button class="primary" id="overlayStart">開始挑戰</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="endOverlay">
      <div class="panel">
        <div class="hero" id="endHero">🎉</div>
        <h2 id="endTitle">挑戰完成</h2>
        <p id="endText"></p>
        <div class="qrbox hidden" id="qrBox"><div class="qr"></div></div>
        <div class="buttons">
          <button class="secondary" id="playAgain">再玩一次</button>
          <button class="primary hidden" id="lineBtn">前往 LINE</button>
        </div>
      </div>
    </div>
  </div>

}

}

function getIcon(name="", sub="") {
  const text = `${name} ${sub}`;
  const rules = [
    [/電池|手機|電腦|螢幕|鍵盤|滑鼠|耳機|充電|電器|燈管|燈泡|遙控器/, "🔋"],

    [/鋁罐|鐵罐|金屬|鍋|鍋蓋|鐵|鋁|銅/, "🥫"],
    [/紙|報紙|紙箱|紙盒|紙杯|紙容器|書本|書籍|信封|紙袋/, "📄"],
    [/塑膠|寶特瓶|瓶|罐|杯|吸管|洗髮|沐浴|清潔劑|保特/, "🧴"],
    [/衣|褲|鞋|包|布|棉被|床單|帽|襪/, "👕"],
    [/樹枝|葉|果皮|果核|剩菜|剩飯|廚餘|菜渣|咖啡渣|茶葉|蛋殼/, "🍎"],
    [/木|竹|筷|牙籤/, "🪵"],
    [/瓷|碗|盤|杯|陶|馬桶/, "🍽️"],
    [/油漆|藥品|農藥|針|刀片/, "⚠️"],
    [/玩具|娃娃|球/, "🧸"]
  ];
  for (const [regex, icon] of rules) {
    if (regex.test(text)) return icon;
  }
  return "🗂️";
}

function makeLeaves() {
  for (let i=0;i<12;i++) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.textContent = ['🍃','🌿','♻️'][i%3];
    leaf.style.left = Math.random()*100 + '%';
    leaf.style.animationDuration = (10 + Math.random()*10) + 's';
    leaf.style.animationDelay = (-Math.random()*8) + 's';
    leaf.style.fontSize = (16 + Math.random()*16) + 'px';
    arena.appendChild(leaf);
  }
}

function resetDescription() {
  descIcon.textContent = "💡";
  descItem.textContent = "等待命中物件";
  descText.textContent = "瞄準畫面上的圖卡並引爆，這裡會顯示該物品的正確處理方式與分類小提醒。";
  descText.classList.add('desc-placeholder');
}

function updateDescription(record, correct) {
  descIcon.textContent = getIcon(record.物品名稱, record.廢棄物所屬分類);
  descItem.textContent = `${correct ? "✔" : "✦"} ${record.物品名稱}`;
  descText.textContent = record.文字說明 || `此物品分類為「${record.大類}」。`;
  descText.classList.remove('desc-placeholder');
}

function spawnOne() {
  const record = pickRandom(DATASET);
  const el = document.createElement('div');
  el.className = 'item';
  el.innerHTML = `
    <div class="emoji">${getIcon(record.物品名稱, record.廢棄物所屬分類)}</div>
    <div class="name">${record.物品名稱}</div>
    <div class="mini">${record.廢棄物所屬分類 || "分類物品"}</div>
  `;
  const topMin = 200;
  const topMax = Math.max(topMin + 10, window.innerHeight - 180);
  const leftMin = 60;
  const leftMax = Math.max(leftMin + 10, Math.min(window.innerWidth, arena.clientWidth || window.innerWidth) - 60);
  const x = leftMin + Math.random() * (leftMax - leftMin);
  const y = topMin + Math.random() * (topMax - topMin);
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  arena.appendChild(el);

  const item = {
    el, record,
    x, y,
    vx: (Math.random() > .5 ? 1 : -1) * (1.0 + Math.random()*1.0),
    vy: (Math.random() > .5 ? 1 : -1) * (0.7 + Math.random()*0.9),
    w: el.offsetWidth || 96,
    h: el.offsetHeight || 98
  };
  activeItems.push(item);
}

function fillItems() {
  while (activeItems.length < MAX_ITEMS) spawnOne();
}

function removeItem(item) {
  activeItems = activeItems.filter(it => it !== item);
  item.el.remove();
  if (isPlaying) spawnOne();
}

function createBlast(x,y) {
  const b = document.createElement('div');
  b.className = 'blast';
  b.style.left = x + 'px';
  b.style.top = y + 'px';
  arena.appendChild(b);
  setTimeout(() => b.remove(), 280);
}

function showToast(text, good=true) {
  toast.textContent = text;
  toast.style.borderColor = good ? 'rgba(34,197,94,.5)' : 'rgba(239,68,68,.5)';
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
}

function shoot() {
  if (!isPlaying) return;
  createBlast(pointer.x, pointer.y);
  let best = null;
  let bestDist = Infinity;
  for (const item of activeItems) {
    const dx = item.x - pointer.x;
    const dy = item.y - pointer.y;
    const dist = Math.hypot(dx,dy);
    if (dist < HIT_RADIUS && dist < bestDist) {
      best = item;
      bestDist = dist;
    }
  }
  if (!best) {
    showToast('未命中，再試一次！', false);
    return;
  }

  const correct = best.record.大類 === currentTarget;
  if (correct) {
    score += SCORE_PER_HIT;
    scoreEl.textContent = score;
    showToast(`命中成功！ +${SCORE_PER_HIT} 分`, true);
  } else {
    showToast(`這個是「${best.record.大類}」`, false);
  }

  updateDescription(best.record, correct);
  best.el.classList.add('hit');
  setTimeout(() => removeItem(best), 220);
  chooseTarget();
}

function tick() {
  if (!isPlaying) return;
  const width = Math.min(window.innerWidth, arena.clientWidth || window.innerWidth);
  const height = window.innerHeight;
  const topMin = 200;
  const bottomLimit = height - 150;
  for (const item of activeItems) {
    item.x += item.vx;
    item.y += item.vy;
    if (item.x < 54 || item.x > width - 54) item.vx *= -1;
    if (item.y < topMin || item.y > bottomLimit) item.vy *= -1;
    item.el.style.left = item.x + 'px';
    item.el.style.top = item.y + 'px';
  }
  animId = requestAnimationFrame(tick);
}

function setCrosshair(x,y) {
  const rect = arena.getBoundingClientRect();
  const cx = Math.max(36, Math.min(rect.width - 36, x - rect.left));
  const cy = Math.max(180, Math.min(rect.height - 110, y - rect.top));
  pointer = {x: cx, y: cy};
  crosshair.style.left = cx + 'px';
  crosshair.style.top = cy + 'px';
}

function bindPointer() {
  const move = (clientX, clientY) => setCrosshair(clientX, clientY);
  arena.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  arena.addEventListener('click', e => {
    move(e.clientX, e.clientY);
    shoot();
  });
  arena.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (!t) return;
    move(t.clientX, t.clientY);
  }, {passive:true});
  arena.addEventListener('touchmove', e => {
    const t = e.touches[0];
    if (!t) return;
    move(t.clientX, t.clientY);
  }, {passive:true});
  arena.addEventListener('touchend', e => {
    shoot();
  });
}

function clearGame() {
  for (const item of activeItems) item.el.remove();
  activeItems = [];
}

function startGame() {
  clearGame();
  resetDescription();
  score = 0;
  timeLeft = GAME_SECONDS;
  isPlaying = true;
  scoreEl.textContent = score;
  timeEl.textContent = timeLeft;
  chooseTarget();
  fillItems();
  cancelAnimationFrame(animId);
  tick();
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft -= 1;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);
  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');
}

function endGame() {
  isPlaying = false;
  clearInterval(timer);
  cancelAnimationFrame(animId);
  const passed = score >= 100;
  endOverlay.classList.remove('hidden');
  if (passed) {
    endHero.textContent = '🎉';
    endTitle.textContent = '恭喜達標';
    endText.innerHTML = `本次得分 <b>${score}</b> 分，已達抽獎門檻。掃描下方 QR 圖樣或點擊按鈕，即可前往 LINE 參加活動。`;
    qrBox.classList.remove('hidden');
    lineBtn.classList.remove('hidden');
  } else {
    endHero.textContent = '🌟';
    endTitle.textContent = '再挑戰一次';
    endText.innerHTML = `本次得分 <b>${score}</b> 分，再接再厲，朝 100 分挑戰！`;
    qrBox.classList.add('hidden');
    lineBtn.classList.add('hidden');
  }
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('overlayStart').addEventListener('click', startGame);
document.getElementById('playAgain').addEventListener('click', startGame);
lineBtn.addEventListener('click', () => window.location.href = LINE_URL);

window.addEventListener('resize', () => setCrosshair(window.innerWidth/2, window.innerHeight*0.68));

makeLeaves();
bindPointer();
setCrosshair(window.innerWidth/2, window.innerHeight*0.68);
</script>
</body>
</html>
