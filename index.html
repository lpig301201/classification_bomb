<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>分類炸彈大挑戰</title>
  <style>
    :root {
      --bg1:#07111f; --bg2:#0f172a; --bg3:#1e293b;
      --panel:rgba(255,255,255,.1); --line:rgba(255,255,255,.14);
      --text:#f8fafc; --muted:#cbd5e1; --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
      --shadow:0 24px 60px rgba(2,6,23,.42);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
    html,body { margin:0; min-height:100%; background:radial-gradient(circle at top, #38bdf8 0%, #1d4ed8 22%, #0f172a 52%, #020617 100%); color:var(--text); font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; overflow:hidden; }
    body { display:flex; justify-content:center; }
    .app { width:min(100vw,760px); min-height:100vh; position:relative; overflow:hidden; }
    #arena { position:absolute; inset:0; overflow:hidden; touch-action:none; }
    #arena::before,#arena::after { content:""; position:absolute; border-radius:50%; filter:blur(42px); opacity:.34; pointer-events:none; }
    #arena::before { width:260px; height:260px; background:#22d3ee; left:-50px; top:14%; }
    #arena::after { width:300px; height:300px; background:#a855f7; right:-60px; bottom:10%; }
    .topbar { position:absolute; inset:0 0 auto 0; z-index:20; padding:calc(12px + var(--safe-top)) 14px 10px; }
    .glass { background:var(--panel); border:1px solid var(--line); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow:var(--shadow); border-radius:24px; }
    .headline { padding:14px 16px; display:grid; grid-template-columns:1.1fr .9fr; gap:10px; align-items:center; }
    .title { font-size:clamp(22px,4.8vw,34px); font-weight:900; line-height:1.05; letter-spacing:.5px; }
    .subtitle { margin-top:6px; color:var(--muted); font-size:13px; line-height:1.45; }
    .scoreboard { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .metric { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:10px 8px; text-align:center; }
    .metric .k { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .metric .v { font-size:clamp(20px,4vw,28px); font-weight:900; }
    .mission { margin-top:10px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .target-label { color:var(--muted); font-size:12px; margin-bottom:4px; }
    .target-chip { display:inline-flex; align-items:center; gap:10px; padding:10px 14px; border-radius:999px; font-size:clamp(18px,4vw,24px); font-weight:900; color:#fff; border:1px solid rgba(255,255,255,.15); }
    .mission-tip { font-size:12px; color:var(--muted); line-height:1.45; text-align:right; max-width:42%; }

    .crosshair { position:absolute; width:82px; height:82px; transform:translate(-50%,-50%); pointer-events:none; z-index:17; opacity:0; transition:opacity .18s ease; }
    .crosshair.show { opacity:1; }
    .crosshair::before,.crosshair::after { content:""; position:absolute; inset:0; margin:auto; background:rgba(255,255,255,.92); border-radius:99px; }
    .crosshair::before { width:3px; height:82px; }
    .crosshair::after { width:82px; height:3px; }
    .crosshair .ring { position:absolute; inset:0; border:3px solid rgba(248,250,252,.96); border-radius:50%; box-shadow:0 0 0 3px rgba(239,68,68,.18), 0 0 26px rgba(255,255,255,.24); }
    .crosshair .dot { position:absolute; inset:0; margin:auto; width:10px; height:10px; border-radius:50%; background:#ef4444; box-shadow:0 0 12px rgba(239,68,68,.75); }

    .floating-item {
      position:absolute; width:98px; height:98px; border-radius:28px; padding:8px 9px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(241,245,249,.95)); color:#0f172a; border:2px solid rgba(255,255,255,.78);
      box-shadow:0 14px 28px rgba(15,23,42,.28); transform:translate(-50%,-50%); transition:transform .08s ease, opacity .12s ease;
    }
    .floating-item .icon { display:block; font-size:35px; line-height:1; margin-bottom:6px; filter:drop-shadow(0 2px 2px rgba(15,23,42,.12)); }
    .floating-item .label { display:block; font-size:14px; font-weight:900; line-height:1.12; }
    .floating-item.hit { animation:popOut .28s ease forwards; }
    .floating-item.wrong { animation:shake .28s ease; }
    .floating-item.enter { animation:itemIn .14s ease-out; }
    @keyframes itemIn { 0%{ transform:translate(-50%,-50%) scale(.78); opacity:0; } 100%{ transform:translate(-50%,-50%) scale(1); opacity:1; } }
    @keyframes popOut { 0%{ transform:translate(-50%,-50%) scale(1); opacity:1; } 100%{ transform:translate(-50%,-50%) scale(1.85); opacity:0; } }
    @keyframes shake { 0%,100%{ transform:translate(-50%,-50%) rotate(0deg); } 25%{ transform:translate(-50%,-50%) rotate(-6deg); } 75%{ transform:translate(-50%,-50%) rotate(6deg); } }

    .bottom-ui { position:absolute; inset:auto 0 0 0; z-index:20; padding:0 14px calc(12px + var(--safe-bottom)); }
    .feedback { min-height:84px; padding:12px 14px; display:flex; align-items:center; gap:10px; }
    .feedback-badge { width:38px; height:38px; border-radius:14px; display:grid; place-items:center; font-size:20px; background:rgba(255,255,255,.12); flex:none; }
    .feedback strong { display:block; font-size:17px; margin-bottom:3px; }
    .feedback p { margin:0; color:var(--muted); font-size:13px; line-height:1.45; }
    .controls { margin-top:10px; display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; }
    .hintbox { padding:12px 14px; font-size:13px; color:var(--muted); line-height:1.45; }
    .action-btn { border:none; border-radius:18px; padding:14px 18px; min-width:132px; font-size:17px; font-weight:900; color:#fff; cursor:pointer; background:linear-gradient(135deg,#22c55e,#06b6d4); box-shadow:0 10px 24px rgba(6,182,212,.25); }
    .action-btn.secondary { background:linear-gradient(135deg,#f59e0b,#ef4444); box-shadow:0 10px 24px rgba(239,68,68,.18); }

    .overlay { position:absolute; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; padding:22px; background:linear-gradient(180deg, rgba(2,6,23,.28), rgba(2,6,23,.8)); }
    .modal { width:min(100%,560px); padding:22px; border-radius:28px; }
    .modal h1,.modal h2 { margin:0 0 10px; line-height:1.1; }
    .modal h1 { font-size:clamp(30px,6.8vw,44px); }
    .modal h2 { font-size:clamp(26px,5.8vw,38px); }
    .modal p { color:var(--muted); line-height:1.7; font-size:15px; }
    .pill-row { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 18px; }
    .pill { padding:10px 14px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); font-size:14px; }
    .modal .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px 0 18px; }
    .modal .card { padding:14px 12px; border-radius:20px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); text-align:center; }
    .modal .card b { display:block; font-size:25px; margin-bottom:6px; }
    .modal-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .link-btn,.ghost-btn { display:inline-flex; align-items:center; justify-content:center; text-decoration:none; border-radius:18px; padding:14px 18px; min-width:148px; font-size:17px; font-weight:900; color:#fff; }
    .link-btn { background:linear-gradient(135deg,#22c55e,#16a34a); }
    .ghost-btn { background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.14); }
    .note { margin-top:12px; font-size:12px; color:#94a3b8; line-height:1.5; }
    .hide { display:none !important; }
    .burst { position:absolute; width:16px; height:16px; border-radius:50%; background:rgba(255,255,255,.9); pointer-events:none; z-index:18; animation:burst .5s ease-out forwards; }
    @keyframes burst { 0%{ transform:translate(-50%,-50%) scale(.2); opacity:1; } 100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.45); opacity:0; } }

    @media (max-width:560px) {
      .headline { grid-template-columns:1fr; }
      .mission { flex-direction:column; align-items:flex-start; }
      .mission-tip { max-width:none; text-align:left; }
      .floating-item { width:84px; height:84px; border-radius:24px; }
      .floating-item .icon { font-size:30px; margin-bottom:4px; }
      .floating-item .label { font-size:13px; }
      .controls { grid-template-columns:1fr; }
      .action-btn,.link-btn,.ghost-btn { width:100%; }
      .modal .grid { grid-template-columns:1fr; }
    }
  
    html,body { height:100%; overscroll-behavior:none; }
    body { position:fixed; inset:0; width:100%; }
    .app { height:100dvh; min-height:100dvh; max-height:100dvh; }
    #arena { padding-top:0; }
    .topbar { padding:calc(8px + var(--safe-top)) 10px 8px; }
    .headline { padding:12px 12px; gap:8px; }
    .subtitle { font-size:12px; line-height:1.35; }
    .scoreboard { gap:6px; }
    .metric { padding:8px 6px; border-radius:14px; }
    .metric .k { font-size:11px; }
    .metric .v { font-size:clamp(18px,4.2vw,24px); }
    .mission { margin-top:8px; padding:10px 12px; gap:8px; }
    .target-label { font-size:11px; }
    .target-chip { padding:8px 12px; font-size:clamp(16px,4vw,20px); }
    .mission-tip { font-size:11px; line-height:1.35; max-width:46%; }
    .bottom-ui { padding:0 10px calc(10px + var(--safe-bottom)); }
    .feedback { min-height:72px; padding:10px 12px; }
    .feedback-badge { width:34px; height:34px; border-radius:12px; font-size:18px; }
    .feedback strong { font-size:15px; margin-bottom:2px; }
    .feedback p { font-size:12px; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .controls { margin-top:8px; gap:8px; }
    .hintbox { padding:10px 12px; font-size:12px; line-height:1.35; }
    .action-btn { min-width:120px; padding:13px 16px; font-size:16px; border-radius:16px; }
    .crosshair { width:72px; height:72px; }
    .crosshair::before { height:72px; }
    .crosshair::after { width:72px; }
    .floating-item { touch-action:none; }
    .overlay { padding:14px; }
    .modal { padding:18px; border-radius:24px; max-height:88dvh; overflow:auto; -webkit-overflow-scrolling:touch; }
    .modal p { font-size:14px; line-height:1.6; }
    .pill-row { gap:8px; margin:12px 0 14px; }
    .pill { padding:8px 12px; font-size:13px; }
    .modal-actions { gap:8px; }
    .link-btn,.ghost-btn { min-width:132px; padding:13px 16px; font-size:16px; border-radius:16px; }

    @media (max-width: 560px) {
      .topbar { padding:calc(6px + var(--safe-top)) 8px 6px; }
      .headline { grid-template-columns:1fr; padding:10px 10px; }
      .title { font-size:clamp(20px,6vw,28px); }
      .subtitle { font-size:11px; }
      .scoreboard { grid-template-columns:repeat(3,1fr); }
      .mission { padding:8px 10px; gap:6px; flex-direction:row; align-items:center; }
      .target-chip { font-size:16px; padding:7px 10px; }
      .mission-tip { font-size:10px; max-width:44%; text-align:right; }
      .floating-item { width:74px; height:74px; border-radius:22px; padding:6px; }
      .floating-item .icon { font-size:26px; margin-bottom:3px; }
      .floating-item .label { font-size:12px; }
      .bottom-ui { padding:0 8px calc(8px + var(--safe-bottom)); }
      .feedback { min-height:64px; padding:8px 10px; }
      .feedback-badge { width:30px; height:30px; font-size:16px; border-radius:10px; }
      .feedback strong { font-size:14px; }
      .feedback p { font-size:11px; -webkit-line-clamp:2; }
      .controls { grid-template-columns:1fr; }
      .hintbox { padding:8px 10px; font-size:11px; }
      .action-btn,.link-btn,.ghost-btn { width:100%; min-width:0; padding:12px 14px; font-size:15px; }
      .crosshair { width:64px; height:64px; }
      .crosshair::before { height:64px; }
      .crosshair::after { width:64px; }
      .modal { padding:16px; border-radius:20px; }
      .modal h1 { font-size:28px; }
      .modal h2 { font-size:24px; }
      .pill-row { flex-direction:column; }
      .pill { width:100%; text-align:center; }
      .modal .grid { grid-template-columns:1fr; }
    }

    @supports not (height: 100dvh) {
      .app { height:100vh; min-height:100vh; max-height:100vh; }
      .modal { max-height:88vh; }
    }

  
    .app::before,
    .app::after{
      content:"";
      position:absolute;
      border-radius:50%;
      pointer-events:none;
      filter:blur(18px);
      opacity:.28;
      z-index:0;
    }
    .app::before{
      width:220px;height:220px;
      left:-70px;top:18%;
      background:radial-gradient(circle, rgba(34,197,94,.9) 0%, rgba(34,197,94,0) 70%);
    }
    .app::after{
      width:260px;height:260px;
      right:-90px;bottom:18%;
      background:radial-gradient(circle, rgba(250,204,21,.85) 0%, rgba(250,204,21,0) 72%);
    }
    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      box-shadow:0 20px 50px rgba(2,6,23,.32), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .headline{
      position:relative;
      overflow:hidden;
    }
    .headline::after{
      content:"";
      position:absolute;
      inset:auto -10% -40% auto;
      width:180px;height:180px;
      background:radial-gradient(circle, rgba(255,255,255,.16), rgba(255,255,255,0) 70%);
      transform:rotate(8deg);
      pointer-events:none;
    }
    .metric{
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }
    .target-chip{
      box-shadow:0 10px 24px rgba(15,23,42,.22), inset 0 1px 0 rgba(255,255,255,.18);
      background:linear-gradient(135deg, rgba(34,197,94,.9), rgba(6,182,212,.86));
    }
    .feedback{
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08));
    }
    .hintbox{
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;
    }
    .floating-item{
      background:linear-gradient(180deg, rgba(255,255,255,1), rgba(240,249,255,.96));
      border:2px solid rgba(255,255,255,.95);
      box-shadow:0 16px 34px rgba(2,6,23,.24), 0 0 0 1px rgba(255,255,255,.16) inset;
    }
    .floating-item .icon{
      filter:drop-shadow(0 4px 5px rgba(2,6,23,.16));
    }

  </style>
</head>
<body>
  <div class="app">
    <div id="arena"></div>
    <div id="crosshair" class="crosshair">
      <div class="ring"></div>
      <div class="dot"></div>
    </div>

    <div class="topbar">
      <div class="glass headline">
        <div>
          <div class="title">♻️ 分類炸彈大挑戰</div>
          
        </div>
        <div class="scoreboard">
          <div class="metric"><div class="k">剩餘時間</div><div class="v" id="timeValue">40</div></div>
          <div class="metric"><div class="k">目前分數</div><div class="v" id="scoreValue">0</div></div>
          <div class="metric"><div class="k">達標門檻</div><div class="v">100</div></div>
        </div>
      </div>
      <div class="glass mission">
        <div>
          <div class="target-label">本回合目標</div>
          <div class="target-chip" id="targetChip">♻️ 資源回收</div>
        </div>
      </div>
    </div>

    <div class="bottom-ui">
      <div class="glass feedback">
        <div class="feedback-badge" id="feedbackBadge">🎯</div>
        <div>
          <strong id="feedbackTitle">準備開始</strong>
          <p id="feedbackText"></p>
        </div>
      </div>
      <div class="controls">
        <button id="startBtn" class="action-btn">開始遊戲</button>
      </div>
    </div>

    <div id="startOverlay" class="overlay">
      <div class="glass modal">
        <h1>分類炸彈大挑戰</h1>
        
        <div class="pill-row">
          <div class="pill">🎯 答對 +10 分</div>
          <div class="pill">⏳ 限時 40 秒</div>
          <div class="pill">🎁 達 100 分抽獎</div>
        </div>
        <div class="modal-actions">
          <button id="overlayStartBtn" class="action-btn">開始挑戰</button>
        </div>
      </div>
    </div>

    <div id="endOverlay" class="overlay hide">
      <div class="glass modal">
        <h2 id="endTitle">挑戰完成</h2>
        <p id="endText"></p>
        <div class="grid">
          <div class="card"><b id="finalScore">0</b>總分</div>
          <div class="card"><b id="finalHits">0</b>答對題數</div>
          <div class="card"><b id="finalAccuracy">0%</b>命中率</div>
        </div>
        <div id="rewardActions" class="modal-actions"></div>
        
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      gameSeconds: 40,
      passScore: 100,
      itemCount: 6,
      feedbackDuration: 450,
      moveSpeedMin: 1.56,
      moveSpeedMax: 3.36,
      lineUrl: "https://line.me/R/ti/p/@yourlineid",

        [/花|盆|土|石|陶|瓷|珪藻土|水晶/, '🪨']
      ];
      for (const [pattern, emoji] of iconMap) { if (pattern.test(name)) return emoji; }
      return category === '廚餘' ? '🍌' : category === '資源回收' ? '♻️' : '🗑️';
    }
    function itemsByCategory(category) { return BANK.filter(x => x.category === category); }
    function setFeedback(title, text, emoji='🎯') {
      feedbackBadge.textContent = emoji;
      feedbackTitle.textContent = title;
      feedbackText.textContent = text;
    }
    function updateStats() {
      timeValue.textContent = state.timeLeft;
      scoreValue.textContent = state.score;
    }
    function setTargetCategory(category) {
      state.targetCategory = category;
      const style = CATEGORY_STYLE[category];
      targetChip.textContent = `${style.emoji} ${category}`;
      targetChip.style.background = style.bg;
    }
    function chooseNextCategory() {
      const categories = CATEGORIES.filter(c => itemsByCategory(c).length);
      const pool = categories.filter(c => c !== state.targetCategory);
      setTargetCategory(sample(pool.length ? pool : categories));
    }
    function clearArena() {
      for (const item of state.activeItems.values()) item.el.remove();
      state.activeItems.clear();
    }
    function randomPosition() {
      const topSafe = window.innerHeight < 700 ? 230 : 250;
      const bottomSafe = window.innerHeight < 700 ? 175 : 195;
      const width = arena.clientWidth;
      const height = arena.clientHeight;
      return {
        x: 64 + Math.random() * Math.max(60, width - 128),
        y: topSafe + Math.random() * Math.max(60, height - topSafe - bottomSafe)
      };
    }
    function overlaps(x, y) {
      for (const item of state.activeItems.values()) {
        const dx = item.x - x, dy = item.y - y;
        if (Math.sqrt(dx*dx + dy*dy) < 86) return true;
      }
      return false;
    }
    function uniqueRandomPosition() {
      let pos = randomPosition();
      for (let i=0; i<12 && overlaps(pos.x, pos.y); i++) pos = randomPosition();
      return pos;
    }
    function makeVelocity() {
      const speed = CONFIG.moveSpeedMin + Math.random() * (CONFIG.moveSpeedMax - CONFIG.moveSpeedMin);
      const angle = Math.random() * Math.PI * 2;
      return { vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed };
    }
    function makeItemData(preferredCategory=null) {
      let bank = BANK;
      if (preferredCategory) {
        const specific = itemsByCategory(preferredCategory);
        if (specific.length) bank = specific;
      }
      return { ...sample(bank) };
    }
    function createItem(preferredCategory=null) {
      const data = makeItemData(preferredCategory);
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'floating-item enter';
      const emoji = getItemEmoji(data.name, data.category);
      el.innerHTML = `<span class="icon">${emoji}</span><span class="label">${data.name}</span>`;
      const pos = uniqueRandomPosition();
      const vel = makeVelocity();
      const id = nextId++;
      const item = { id, el, data, x:pos.x, y:pos.y, vx:vel.vx, vy:vel.vy };
      el.style.left = `${item.x}px`;
      el.style.top = `${item.y}px`;
      el.addEventListener('animationend', () => el.classList.remove('enter'), { once:true });
      el.addEventListener('pointerdown', (e) => { e.preventDefault(); hitItem(id); });
      arena.appendChild(el);
      state.activeItems.set(id, item);
      return item;
    }
    function ensureTargetPresent() {
      const hasTarget = [...state.activeItems.values()].some(item => item.data.category === state.targetCategory);
      if (!hasTarget) createItem(state.targetCategory);
    }
    function fillArena() {
      while (state.activeItems.size < CONFIG.itemCount) {
        const mustTarget = ![...state.activeItems.values()].some(item => item.data.category === state.targetCategory);
        createItem(mustTarget ? state.targetCategory : null);
      }
      ensureTargetPresent();
    }
    function replaceOne(removedCategory, wasTarget) {
      if (state.ended) return;
      let preferred = null;
      if (wasTarget) {
        chooseNextCategory();
        preferred = state.targetCategory;
      } else if (![...state.activeItems.values()].some(item => item.data.category === state.targetCategory)) {
        preferred = state.targetCategory;
      }
      createItem(preferred);
      ensureTargetPresent();
    }
    function burst(x, y) {
      for (let i=0; i<10; i++) {
        const spark = document.createElement('div');
        spark.className = 'burst';
        const angle = Math.random() * Math.PI * 2;
        const dist = 28 + Math.random() * 46;
        spark.style.setProperty('--dx', `${Math.cos(angle)*dist}px`);
        spark.style.setProperty('--dy', `${Math.sin(angle)*dist}px`);
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        arena.appendChild(spark);
        spark.addEventListener('animationend', () => spark.remove(), { once:true });
      }
    }
    function hitItem(id) {
      if (state.ended || !state.started) return;
      const item = state.activeItems.get(id);
      if (!item) return;
      state.attempts += 1;
      const correct = item.data.category === state.targetCategory;
      if (correct) {
        state.score += 10;
        state.hits += 1;
        item.el.classList.add('hit');
        burst(item.x, item.y);
        setFeedback('命中成功！', `「${item.data.name}」屬於${item.data.category}。`, '💥');
      } else {
        item.el.classList.add('wrong');
        setFeedback('再瞄準一次', `「${item.data.name}」不是本回合目標。`, '⚠️');
      }
      updateStats();
      const removeDelay = correct ? 180 : 160;
      const removedCategory = item.data.category;
      setTimeout(() => {
        if (item.el.isConnected) item.el.remove();
        state.activeItems.delete(id);
        replaceOne(removedCategory, correct);
      }, removeDelay);
    }
    function updateItems() {
      if (state.ended) return;
      const width = arena.clientWidth;
      const height = arena.clientHeight;
      const topSafe = window.innerHeight < 700 ? 230 : 250;
      const bottomSafe = window.innerHeight < 700 ? 175 : 195;
      for (const item of state.activeItems.values()) {
        item.x += item.vx;
        item.y += item.vy;
        if (item.x < 54 || item.x > width - 54) item.vx *= -1;
        if (item.y < topSafe || item.y > height - bottomSafe) item.vy *= -1;
        item.x = clamp(item.x, 54, width - 54);
        item.y = clamp(item.y, topSafe, height - bottomSafe);
        item.el.style.left = `${item.x}px`;
        item.el.style.top = `${item.y}px`;
      }
      state.raf = requestAnimationFrame(updateItems);
    }
    function startGame() {
      state.started = true; state.ended = false; state.score = 0; state.hits = 0; state.attempts = 0; state.timeLeft = CONFIG.gameSeconds;
      updateStats(); clearArena(); chooseNextCategory();
      startOverlay.classList.add('hide'); endOverlay.classList.add('hide'); crosshair.classList.add('show');
      setFeedback('遊戲開始！', '把準星移到正確物品上，點一下就能引爆得分。', '🚀');
      fillArena();
      clearInterval(state.timer);
      state.timer = setInterval(() => {
        state.timeLeft -= 1; updateStats();
        if (state.timeLeft <= 0) endGame();
      }, 1000);
      cancelAnimationFrame(state.raf);
      state.raf = requestAnimationFrame(updateItems);
    }
    function endGame() {
      if (state.ended) return;
      state.ended = true;
      clearInterval(state.timer); cancelAnimationFrame(state.raf); clearArena();
      const passed = state.score >= CONFIG.passScore;
      const accuracy = state.attempts ? Math.round((state.hits / state.attempts) * 100) : 0;
      document.getElementById('finalScore').textContent = state.score;
      document.getElementById('finalHits').textContent = state.hits;
      document.getElementById('finalAccuracy').textContent = `${accuracy}%`;
      document.getElementById('endTitle').textContent = passed ? '🎉 挑戰成功！' : '再挑戰一次！';
      document.getElementById('endText').innerHTML = passed
        ? `你本次獲得 <b>${state.score}</b> 分，已達到抽獎門檻，現在就前往 LINE 參加活動。`
        : `你本次獲得 <b>${state.score}</b> 分，距離 100 分門檻還差一點點，再試一次吧！`;
      rewardActions.innerHTML = '';
      const retryBtn = document.createElement('button');
      retryBtn.className = 'action-btn secondary';
      retryBtn.textContent = '再玩一次';
      retryBtn.addEventListener('click', startGame);
      rewardActions.appendChild(retryBtn);
      if (passed) {
        const lineBtn = document.createElement('a');
        lineBtn.className = 'link-btn';
        lineBtn.href = CONFIG.lineUrl;
        lineBtn.target = '_blank';
        lineBtn.rel = 'noopener noreferrer';
        lineBtn.textContent = CONFIG.lineButtonText;
        rewardActions.prepend(lineBtn);
      }
      endOverlay.classList.remove('hide');
      crosshair.classList.remove('show');
      setFeedback(passed ? '挑戰成功！' : '差一點點！', passed ? '已達標，可前往 LINE 抽獎。' : '再挑戰一次，把分數拉上去。', passed ? '🏆' : '🔥');
    }
    function updatePointer(clientX, clientY) {
      const rect = arena.getBoundingClientRect();
      state.pointerX = clamp(clientX - rect.left, 0, rect.width);
      state.pointerY = clamp(clientY - rect.top, 0, rect.height);
      crosshair.style.left = `${state.pointerX}px`;
      crosshair.style.top = `${state.pointerY}px`;
    }
    arena.addEventListener('pointermove', e => updatePointer(e.clientX, e.clientY));
    arena.addEventListener('pointerdown', e => updatePointer(e.clientX, e.clientY));
    window.addEventListener('resize', () => {
      updatePointer(window.innerWidth / 2, window.innerHeight / 2);
    });
    startBtn.addEventListener('click', startGame);
    overlayStartBtn.addEventListener('click', startGame);
    updateStats();
    setTargetCategory('資源回收');
    updatePointer(window.innerWidth/2, window.innerHeight/2);


    function getViewportScaleFactor() {
      const w = window.innerWidth || 390;
      const h = window.innerHeight || 844;
      const baseArea = 390 * 844;
      const area = w * h;
      const ratio = Math.sqrt(area / baseArea);
      return Math.max(0.82, Math.min(1.22, ratio));
    }

    function applyResponsiveSpeed() {
      const factor = getViewportScaleFactor();
      if (typeof CONFIG !== 'undefined') {
        CONFIG.moveSpeedMin = +(1.56 * factor).toFixed(2);
        CONFIG.moveSpeedMax = +(3.36 * factor).toFixed(2);
        CONFIG.feedbackDuration = Math.max(320, Math.round(450 / factor));
      }
      window.__speedFactor = factor;
    }

    applyResponsiveSpeed();
    window.addEventListener('resize', applyResponsiveSpeed, { passive:true });
    window.addEventListener('orientationchange', applyResponsiveSpeed, { passive:true });

    function fitForMobile() {
      const app = document.querySelector('.app');
      if (!app) return;
      const vh = window.innerHeight;
      app.style.height = vh + 'px';
      app.style.minHeight = vh + 'px';
      app.style.maxHeight = vh + 'px';
    }

    window.addEventListener('resize', fitForMobile, { passive:true });
    window.addEventListener('orientationchange', fitForMobile, { passive:true });
    document.addEventListener('visibilitychange', fitForMobile);
    fitForMobile();

  </script>
</body>
